[tools]
rust = "latest"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.test-render]
description = "Run render tests with visible diagram output"
run = "cargo test render_complex -- --nocapture"

[tasks.lint]
description = "Run clippy linter"
run = "cargo clippy -- -D warnings"

[tasks.fmt]
description = "Format code"
run = "cargo fmt"

[tasks.fmt-check]
description = "Check code formatting"
run = "cargo fmt -- --check"

[tasks.link]
description = "Build and symlink unid to ~/.local/bin"
depends = ["build"]
run = """
mkdir -p ~/.local/bin
ln -sf "$(pwd)/target/debug/unid" ~/.local/bin/unid
echo "Linked: ~/.local/bin/unid"
"""

[tasks.unlink]
description = "Remove unid symlink from ~/.local/bin"
run = """
if [ -L ~/.local/bin/unid ]; then
  rm ~/.local/bin/unid
  echo "Unlinked: ~/.local/bin/unid"
elif [ -e ~/.local/bin/unid ]; then
  echo "Error: ~/.local/bin/unid exists but is not a symlink" >&2
  exit 1
else
  echo "Nothing to unlink: ~/.local/bin/unid not found"
fi
"""

[tasks.release]
description = "Interactive release (version bump, tag, push)"
raw = true
run = "bash scripts/release.sh"
